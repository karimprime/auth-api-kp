name: Build and Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    # الصلاحيات المطلوبة حصرياً للـ Trusted Publisher
    permissions:
      id-token: write
      contents: read

    steps:
      # Checkout the source code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js environment with specified version and package registry config
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Install exact dependencies matching package-lock.json
      - name: Install dependencies
        run: npm ci

      # Build the specific library 'auth-api-kp'
      - name: Build library
        run: npx ng build auth-api-kp --configuration production

      # Publish the build artifact to npm using Trusted Publisher
      - name: Publish Package to npm
        run: |
          if [ -d "dist/@karimprime/auth-api-kp" ]; then
            cd dist/@karimprime/auth-api-kp
          else
            cd dist/auth-api-kp
          fi
          npm publish --access public
