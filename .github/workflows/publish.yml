name: Build and Publish to npm

on:
  push:
    branches:
      - main

# بنضيف الـ Variable هنا عشان نتخلص من الـ Warning بتاع Node.js تماماً
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Checkout the source code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js environment with specified version and package registry config
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Install exact dependencies matching package-lock.json
      - name: Install dependencies
        run: npm ci

      # Build the specific library 'auth-api-kp'
      - name: Build library
        run: npx ng build auth-api-kp --configuration production

      # Publish the built library to npm
      # IMPORTANT: Bump the version in projects/auth-api-kp/package.json before each push
      - name: Publish Package to npm
        run: npm publish ./dist/auth-api-kp --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
